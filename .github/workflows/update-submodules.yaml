name: Update submodule pointers

on:
  schedule:
    - cron: "0 0 * * *" # midnight UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f
        with:
          submodules: true
          token: ${{ secrets.SUBMODULE_UPDATE_TOKEN || github.token }}

      - name: Update all submodules to latest
        run: git submodule update --remote

      - name: Check for submodule pointer changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "All submodule pointers are up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Lua test runtime
        if: steps.changes.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks
          sudo luarocks --lua-version=5.2 install luaunit

      - name: Run ModpackLib tests
        if: steps.changes.outputs.changed == 'true'
        working-directory: adamant-ModpackLib
        run: lua5.2 tests/all.lua

      - name: Run ModpackFramework tests
        if: steps.changes.outputs.changed == 'true'
        working-directory: adamant-ModpackFramework
        run: lua5.2 tests/all.lua

      - name: Run BoonBans tests
        if: steps.changes.outputs.changed == 'true'
        working-directory: Submodules/adamant-RunDirector_BoonBans
        run: lua5.2 tests/all.lua

      - name: Open or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SUBMODULE_UPDATE_TOKEN || github.token }}
        run: |
          BRANCH="automation/update-submodules"
          TITLE="Update submodule pointers"
          BODY="Automated submodule pointer update. Lua test suites passed before this PR was opened."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "update submodule pointers"
          git push --force-with-lease origin "$BRANCH"

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "$TITLE" --body "$BODY"
          else
            gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY"
          fi
